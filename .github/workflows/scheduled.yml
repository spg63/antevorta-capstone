# W0-01 §7-S5 — the weekly FULL suite (slow marks included) on main, plus manual dispatch.
# Per-commit CI runs `-m "not slow"`; reference-number reproductions and other slow-marked
# integration tests run HERE and at ticket-close locally (preamble §4/§5).

name: Scheduled full suite

on:
  schedule:
    - cron: "0 6 * * 1" # Mondays 06:00 UTC
  workflow_dispatch:

jobs:
  full-suite:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v5
      - run: uv python install 3.12
      - run: uv sync --frozen --python 3.12
      - run: uv run pytest --cov
